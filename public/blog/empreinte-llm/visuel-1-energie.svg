<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif">
  <rect width="1200" height="650" fill="#0C1F3F"/>

  <!-- HEADER -->
  <text x="60" y="70" font-size="34" font-weight="700" fill="#E8E0D5" letter-spacing="-0.5">Énergie consommée par an</text>
  <text x="60" y="100" font-size="15" fill="#8B9AAB">3 650 requêtes/an · équivalent en heures d'une lampe LED 10 W</text>
  <line x1="60" y1="120" x2="200" y2="120" stroke="#C17F59" stroke-width="2"/>

  <!-- AXIS (log scale 1 h → 10 000 h) -->
  <text x="320" y="160" font-size="11" fill="#8B9AAB" text-anchor="middle">1 h</text>
  <text x="522" y="160" font-size="11" fill="#8B9AAB" text-anchor="middle">10 h</text>
  <text x="725" y="160" font-size="11" fill="#8B9AAB" text-anchor="middle">100 h</text>
  <text x="927" y="160" font-size="11" fill="#8B9AAB" text-anchor="middle">1 000 h</text>
  <text x="1130" y="160" font-size="11" fill="#8B9AAB" text-anchor="middle">10 000 h</text>
  <text x="1140" y="175" font-size="10" font-style="italic" fill="#8B9AAB" text-anchor="end">échelle logarithmique</text>

  <!-- GRID -->
  <line x1="320" y1="185" x2="320" y2="555" stroke="#E8E0D5" stroke-opacity="0.18" stroke-width="1"/>
  <line x1="522" y1="185" x2="522" y2="555" stroke="#E8E0D5" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="725" y1="185" x2="725" y2="555" stroke="#E8E0D5" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="927" y1="185" x2="927" y2="555" stroke="#E8E0D5" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="1130" y1="185" x2="1130" y2="555" stroke="#E8E0D5" stroke-opacity="0.18" stroke-width="1"/>

  <!-- BARS — formula: x = 320 + (log10(v)/4) * 810 -->

  <!-- 1. Gemini 2.5 médian — 15 h -->
  <text x="305" y="215" font-size="15" font-weight="600" fill="#F4F8F5" text-anchor="end">Gemini 2.5 médian ⭐</text>
  <rect x="320" y="195" width="238" height="30" fill="#4A9D70" rx="3"/>
  <text x="570" y="215" font-size="15" font-weight="700" fill="#E8E0D5">15 h</text>

  <!-- 2. Gemini 2.5 Flash — 18 h -->
  <text x="305" y="255" font-size="15" font-weight="600" fill="#F4F8F5" text-anchor="end">Gemini 2.5 Flash</text>
  <rect x="320" y="235" width="254" height="30" fill="#4A9D70" rx="3"/>
  <text x="586" y="255" font-size="15" font-weight="700" fill="#E8E0D5">18 h</text>

  <!-- 3. GPT-5 mini — 30 h -->
  <text x="305" y="295" font-size="15" font-weight="600" fill="#F4F8F5" text-anchor="end">GPT-5 mini</text>
  <rect x="320" y="275" width="299" height="30" fill="#4A9D70" rx="3"/>
  <text x="631" y="295" font-size="15" font-weight="700" fill="#E8E0D5">30 h</text>

  <!-- 4. Claude Haiku 4.5 — 37 h -->
  <text x="305" y="335" font-size="15" font-weight="600" fill="#F4F8F5" text-anchor="end">Claude Haiku 4.5</text>
  <rect x="320" y="315" width="318" height="30" fill="#4A9D70" rx="3"/>
  <text x="650" y="335" font-size="15" font-weight="700" fill="#E8E0D5">37 h</text>

  <!-- 5. GPT-4o — 73 h -->
  <text x="305" y="375" font-size="15" font-weight="600" fill="#F4F8F5" text-anchor="end">GPT-4o</text>
  <rect x="320" y="355" width="377" height="30" fill="#D4A437" rx="3"/>
  <text x="709" y="375" font-size="15" font-weight="700" fill="#E8E0D5">73 h</text>

  <!-- 6. GPT-5 normal — 140 h -->
  <text x="305" y="415" font-size="15" font-weight="600" fill="#F4F8F5" text-anchor="end">GPT-5 (mode normal)</text>
  <rect x="320" y="395" width="435" height="30" fill="#D4A437" rx="3"/>
  <text x="767" y="415" font-size="15" font-weight="700" fill="#E8E0D5">140 h</text>

  <!-- 7. Claude Sonnet 4.6 — 170 h -->
  <text x="305" y="455" font-size="15" font-weight="600" fill="#F4F8F5" text-anchor="end">Claude Sonnet 4.6</text>
  <rect x="320" y="435" width="452" height="30" fill="#D4A437" rx="3"/>
  <text x="784" y="455" font-size="15" font-weight="700" fill="#E8E0D5">170 h</text>

  <!-- 8. Claude Sonnet ET — 1 030 h -->
  <text x="305" y="495" font-size="15" font-weight="600" fill="#F4F8F5" text-anchor="end">Claude Sonnet Extended Thinking</text>
  <rect x="320" y="475" width="610" height="30" fill="#C17F59" rx="3"/>
  <text x="942" y="495" font-size="15" font-weight="700" fill="#E8E0D5">1 030 h</text>

  <!-- 9. o3 — 2 370 h -->
  <text x="305" y="535" font-size="15" font-weight="600" fill="#F4F8F5" text-anchor="end">o3 (OpenAI)</text>
  <rect x="320" y="515" width="683" height="30" fill="#C17F59" rx="3"/>
  <text x="1015" y="535" font-size="15" font-weight="700" fill="#E8E0D5">2 370 h</text>

  <!-- LEGEND -->
  <rect x="60" y="600" width="12" height="12" fill="#4A9D70" rx="2"/>
  <text x="80" y="611" font-size="12" fill="#E8E0D5">léger</text>
  <rect x="140" y="600" width="12" height="12" fill="#D4A437" rx="2"/>
  <text x="160" y="611" font-size="12" fill="#E8E0D5">standard</text>
  <rect x="240" y="600" width="12" height="12" fill="#C17F59" rx="2"/>
  <text x="260" y="611" font-size="12" fill="#E8E0D5">reasoning</text>
  <text x="1140" y="611" font-size="11" font-style="italic" fill="#8B9AAB" text-anchor="end">⭐ mesure directe constructeur</text>
</svg>
